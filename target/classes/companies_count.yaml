name: "Companies Count Validation"
testData:
  - companyName: "Zarwin"
  - companyName: "3P"

steps:
  # SETUP: Silent
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/client"
  - action: "silent_wait"
    value: "8000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/client"

  # DATA LOOP
  - name: "Sequential Company Search and Count"
    action: "data_loop"
    steps:
      - action: "input"
        locator: "xpath=//input[@id='search-button']"
        value: "${companyName}"
        send_enter: true
        clear_before: true
      
      - action: "wait"
        value: "3000"

      - action: "custom_get_grid_count"
        locator: "xpath=//p[contains(@class, 'MuiTablePagination-displayedRows')]"
        value: "${companyName}"
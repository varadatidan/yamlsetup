name: "Skill Assignment - Search and Select Result"

testData:
  - search_query: "Rutuja"
    skill_name: "Automation Testing"

steps:
  # --- SETUP ---
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skill-assignment"
  - action: "silent_wait"
    value: "10000"

  - action: "data_loop"
    name: "P1: Search and Select Resource"
    steps:
      # 1. Open the Assign Dialog
      - action: "click"
        locator: "xpath=//button[@id='assign-button' or contains(., 'Assign')]"
      
      # 2. Click the Resource Dropdown to reveal the search input
      - action: "click"
        locator: "xpath=//button[.//span[contains(text(), '-- Select Resource --')]]"
      
      # 3. Input the search term (Rutuja)
      - action: "input"
        locator: "xpath=//input[@placeholder='Search...']"
        value: "${search_query}"
        clear_before: true
        # We don't send Enter here yet, because we need to click the filtered result
      
      - action: "silent_wait"
        value: "2000"

      # 4. Select the specific value "Rutuja" from the filtered list
      # This targets the item in the dropdown list that matches the search query
      - action: "click"
        locator: "xpath=//div[@role='option' or contains(@class, 'select-item')][descendant::*[contains(text(), '${search_query}')]]"
      
      - action: "silent_wait"
        value: "1000"

      # --- REPEAT FOR SKILL ---
      - action: "click"
        locator: "xpath=//button[.//span[contains(text(), '-- Select Skill --')]]"

      - action: "input"
        locator: "xpath=//input[@placeholder='Search...']"
        value: "${skill_name}"
        clear_before: true

      - action: "click"
        locator: "xpath=//div[@role='option' or contains(@class, 'select-item')][descendant::*[contains(text(), '${skill_name}')]]"

      # --- SAVE ---
      - action: "click"
        locator: "xpath=//button[@type='submit' or contains(text(), 'Save')]"
name: "Projects Grid - Workflow A (Perfected)"

steps:
  # --- SETUP: Bypassing MSAL ---
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/projects"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/projects"
  - action: "silent_wait"
    value: "6000"

  # --- P1: CLIENT ---
  - name: "P1: Client - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Verification Sort
  - action: "click"
    locator: "xpath=//div[@data-field='companyName']//*[contains(text(), 'Client')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='companyName']"
  - action: "silent_click" # Use silent_click for the three dots
    locator: "xpath=//div[@data-field='companyName']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"

  # --- P2: PROJECT NAME ---
  - name: "P2: Project Name - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Verification Sort
  - action: "click"
    locator: "xpath=//div[@data-field='projectName']//*[contains(text(), 'Project Name')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='projectName']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='projectName']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"

  # --- P3: SOURCE ---
  - name: "P3: Source - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Verification Sort
  - action: "click"
    locator: "xpath=//div[@data-field='source']//*[contains(text(), 'Source')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='source']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='source']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"

  # --- P4: ACTIVE ---
  - name: "P4: Active - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Verification Sort
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='active']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='active']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"

  # --- P5: GLOBAL SWEEP ---
  - name: "P5: Global Sorting Sweep"
    action: "refresh"
  - action: "silent_wait"
    value: "10000"
  - action: "click"
    locator: "xpath=//div[@data-field='companyName']//*[contains(text(), 'Client')]"
  - action: "click"
    locator: "xpath=//div[@data-field='projectName']//*[contains(text(), 'Project Name')]"
  - action: "click"
    locator: "xpath=//div[@data-field='source']//*[contains(text(), 'Source')]"
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"

  # --- P6: TRAVERSAL ---
  - name: "P6: Full Grid Traversal"
    action: "full_traversal"
name: "Search, Clear, Re-Search, and Export User Data"
steps:
  - name: "Navigate to Resources Page"
    action: "navigate"
    value: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/projects/resources"
  - name: "Search for user 'varad'"
    action: "input"
    locator: "xpath=//input[contains(@placeholder, 'Search') or @type='search' or @aria-label='Search']"
    value: "varad"
  - name: "Wait for search results for 'varad'"
    action: "wait"
    value: "2000"
  - name: "Clear the search field"
    action: "input"
    locator: "xpath=//input[contains(@placeholder, 'Search') or @type='search' or @aria-label='Search']"
    value: ""
  - name: "Wait after clearing search"
    action: "wait"
    value: "1000"
  - name: "Search for user 'advait'"
    action: "input"
    locator: "xpath=//input[contains(@placeholder, 'Search') or @type='search' or @aria-label='Search']"
    value: "advait"
  - name: "Wait for search results for 'advait'"
    action: "wait"
    value: "2000"
  - name: "Click the Export button"
    action: "click"
    locator: "xpath=//button[contains(.,'Export')]"
    action: "wait"
    value: "2000"

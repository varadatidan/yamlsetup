name: "Email Templates Grid - Full UI & Sorting Validation"

steps:
  # --- SETUP ---
  - action: "navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "6000"

  # --- PRIORITY 1: DESCRIPTION ---
  - name: "Priority 1: Description - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='description']//*[contains(text(), 'Description')]"
  - action: "click"
    locator: "xpath=//div[@data-field='description']//*[contains(text(), 'Description')]"
  - action: "hover"
    locator: "xpath=//div[@data-field='description']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='description']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  # CHANGED TO silent_click TO BYPASS THE CLICKABLE CHECK
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 2: FROM ---
  - name: "Priority 2: From - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='from']//*[contains(text(), 'From')]"
  - action: "click"
    locator: "xpath=//div[@data-field='from']//*[contains(text(), 'From')]"
  - action: "hover"
    locator: "xpath=//div[@data-field='from']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='from']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 3: SEND TO ---
  - name: "Priority 3: Send To - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='sendTo']//*[contains(text(), 'To')]"
  - action: "click"
    locator: "xpath=//div[@data-field='sendTo']//*[contains(text(), 'To')]"
  - action: "hover"
    locator: "xpath=//div[@data-field='sendTo']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='sendTo']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 4: FULL TRAVERSAL ---
  - name: "Priority 4: Full Grid Traversal"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/email-templates"
  - action: "silent_wait"
    value: "8000"
  - action: "full_traversal"
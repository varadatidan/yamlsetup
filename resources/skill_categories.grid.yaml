name: "Skill Categories - Full UI & Sorting Validation"

steps:
  # --- SETUP ---
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skills-category"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skills-category"
  - action: "silent_wait"
    value: "6000"

  # --- PRIORITY 1: SKILL NAME (Sort & Hide) ---
  - name: "Priority 1: Skill Name - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Sort A-Z and Z-A
  - action: "click"
    locator: "xpath=//div[@data-field='skillName']//*[contains(text(), 'Skill Name')]"
  - action: "click"
    locator: "xpath=//div[@data-field='skillName']//*[contains(text(), 'Skill Name')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='skillName']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='skillName']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 2: ACTIVE STATUS (Sort & Hide) ---
  - name: "Priority 2: Active Status - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Sort A-Z and Z-A
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  # Hide Logic
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='active']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='active']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 3: FULL TRAVERSAL ---
  - name: "Priority 3: Full Grid Traversal"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  - action: "full_traversal"

  # --- PRIORITY 4: GLOBAL SWEEP SORTING ---
  - name: "Priority 4: Global Header Sorting Sweep"
    action: "refresh"
  - action: "silent_wait"
    value: "10000"
  - action: "click"
    locator: "xpath=//div[@data-field='skillName']//*[contains(text(), 'Skill Name')]"
  - action: "click"
    locator: "xpath=//div[@data-field='skillName']//*[contains(text(), 'Skill Name')]"
    
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
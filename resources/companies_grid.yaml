name: "Companies Grid - Full UI Validation"

steps:
  # --- SETUP ---
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/client"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/client"
  - action: "silent_wait"
    value: "6000"

  # --- PRIORITY 1: HIDE COMPANY ---
  - name: "Priority 1: Hide Company Column"
    action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='companyName']"
  - action: "click"
    locator: "xpath=//div[@data-field='companyName']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"
  - action: "refresh"

  # --- PRIORITY 2: HIDE TYPE ---
  - name: "Priority 2: Hide Type Column"
    action: "silent_wait"
    value: "8000"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='companyType']"
  - action: "click"
    locator: "xpath=//div[@data-field='companyType']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"
  - action: "refresh"

  # --- PRIORITY 3: HIDE SOURCE ---
  - name: "Priority 3: Hide Source Column"
    action: "silent_wait"
    value: "8000"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='companySource']"
  - action: "click"
    locator: "xpath=//div[@data-field='companySource']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
  - action: "wait"
    value: "2000"
  - action: "refresh"

  # --- PRIORITY 4: FULL TRAVERSAL (Restored) ---
  - name: "Priority 4: Full Grid Traversal"
    action: "silent_wait"
    value: "8000"
  - action: "full_traversal"


  # --- PRIORITY 5: GLOBAL HEADER SORTING ---
  - name: "Priority 5: Global Header Sorting Validation"
    action: "refresh"
  - action: "silent_wait"
    value: "10000"

    # 1. Sort Company
  - action: "click"
    locator: "xpath=//div[@data-field='companyName']//*[contains(text(), 'Company')]"
  - action: "wait"
    value: "2000"

        # 3. Sort Source
  - action: "click"
    locator: "xpath=//div[@data-field='companySource']//*[contains(text(), 'Source')]"
  - action: "wait"
    value: "2000"
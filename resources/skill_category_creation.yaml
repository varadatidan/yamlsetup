name: "Skill Categories - Create & Validate"

testData:
  - category_name: "Software Automation"

steps:
  # --- SETUP: Dual Navigation Pattern ---
  - action: "navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skills-category"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skills-category"
  - action: "silent_wait"
    value: "6000"

  # --- P1: MANDATORY FIELD VALIDATION ---
  - name: "P1: Form Validation Capture"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Open Add New Skill Category Dialog
  - action: "click"
    locator: "xpath=(//button[@id='assign-button'])[2]"
  - action: "silent_wait"
    value: "2000"
  # Click Save (Index 3) without data to trigger red error messages
  - action: "click"
    locator: "xpath=(//button[@id='assign-button'])[3]"
  - action: "wait"
    value: "3000"
  # Close Dialog to reset for actual data entry
  - action: "click"
    locator: "xpath=//button[@data-slot='dialog-close']"

  # --- P2: DATA DRIVEN CATEGORY CREATION ---
  - name: "P2: Add New Skill Categories"
    action: "data_loop"
    steps:
      # 1. Open the Dialog
      - action: "click"
        locator: "xpath=(//button[@id='assign-button'])[2]"
      - action: "silent_wait"
        value: "2000"

      # 2. Input Skill Name
      # Using index [2] as the grid search also uses 'search-button' id
      - action: "input"
        locator: "xpath=(//input[@id='search-button'])[2]"
        value: "${category_name}"
        clear_before: true

      # 3. Mark Skill Active
      # Targeted by the role and the label proximity
      - action: "click"
        locator: "xpath=//button[@role='checkbox' or @data-slot='checkbox']"
      
      - action: "silent_wait"
        value: "1000"

      # 4. Save (Index 3 corresponds to the blue Save button)
      - action: "click"
        locator: "xpath=(//button[@id='assign-button'])[3]"
      
      - action: "silent_wait"
        value: "5000"
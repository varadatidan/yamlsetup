name: "Data Imports - Full UI & Sorting Validation"

steps:
  # --- SETUP: Standard Navigation ---
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/data-imports"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/data-imports"
  - action: "silent_wait"
    value: "6000"

  # --- PRIORITY 1: DATA ITEM (Sort & Hide) ---
  - name: "Priority 1: Data Item - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Sort Toggle A-Z / Z-A
  - action: "click"
    locator: "xpath=//div[@data-field='dataItem']//*[contains(text(), 'Data Item')]"
  - action: "click"
    locator: "xpath=//div[@data-field='dataItem']//*[contains(text(), 'Data Item')]"
  # Hide Logic via MUI Menu
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='dataItem']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='dataItem']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 2: ACTION DESCRIPTION (Sort & Hide) ---
  - name: "Priority 2: Action Description - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='description']//*[contains(text(), 'Action Description')]"
  - action: "click"
    locator: "xpath=//div[@data-field='description']//*[contains(text(), 'Action Description')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='description']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='description']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 3: LAST STATUS (Sort & Hide) ---
  - name: "Priority 3: Last Status - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='lastStatus']//*[contains(text(), 'Last Status')]"
  - action: "click"
    locator: "xpath=//div[@data-field='lastStatus']//*[contains(text(), 'Last Status')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='lastStatus']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='lastStatus']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"
    
  - name: "Priority 4: Action - Sort & Hide"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='actionLabel']//*[contains(text(), 'Action')]"
  - action: "click"
    locator: "xpath=//div[@data-field='actionLabel']//*[contains(text(), 'Action')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='actionLabel']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='actionLabel']//button[contains(@class, 'MuiDataGrid-menuIcon')]"
  - action: "click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"


  # --- PRIORITY 5: FULL TRAVERSAL ---
  - name: "Priority 5: Full Grid Traversal"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  - action: "full_traversal"
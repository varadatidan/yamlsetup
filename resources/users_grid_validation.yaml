name: "Users Grid - Full UI & Sorting Validation"

steps:
  # --- SETUP: Standard Navigation ---
  - action: "navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "10000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "6000"

  # --- PRIORITY 1: USER NAME ---
  - name: "Priority 1: User Name - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='userName']//*[contains(text(), 'Name')]"
  - action: "click"
    locator: "xpath=//div[@data-field='userName']//*[contains(text(), 'Name')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='userName']"
  # Use silent_click to bypass the 'clickable' opacity check
  - action: "silent_click"
    locator: "xpath=//div[@data-field='userName']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 2: EMAIL ---
  - name: "Priority 2: Email - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='email']//*[contains(text(), 'Email')]"
  - action: "click"
    locator: "xpath=//div[@data-field='email']//*[contains(text(), 'Email')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='email']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='email']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 3: ACTIVE STATUS ---
  - name: "Priority 3: Active Status - Sort & Hide"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "8000"
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  - action: "click"
    locator: "xpath=//div[@data-field='active']//*[contains(text(), 'Active')]"
  - action: "hover"
    locator: "xpath=//div[@role='columnheader' and @data-field='active']"
  - action: "silent_click"
    locator: "xpath=//div[@data-field='active']//button[contains(@aria-label, 'menu')]"
  - action: "silent_wait"
    value: "1500"
  - action: "silent_click"
    locator: "xpath=//li[@role='menuitem']//*[contains(text(), 'Hide column')]"

  # --- PRIORITY 4: FULL TRAVERSAL ---
  - name: "Priority 4: Full Grid Traversal"
    action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/users"
  - action: "silent_wait"
    value: "8000"
  - action: "full_traversal"
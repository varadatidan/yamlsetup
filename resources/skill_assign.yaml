name: "Skill Assignment - End-to-End Flow & Validation"

testData:
  - resource_name: "Rutuja"
    skill_name: "QA"
    sub_skill: "API"
    proficiency_score: "3"
  - resource_name: "Hazel"
    skill_name: "BigData"
    sub_skill: "Hadoop"
    proficiency_score: "3"

steps:
  # --- SETUP: Dual Navigation Pattern ---
  - action: "navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skill-assignment"
  - action: "silent_wait"
    value: "8000"
  - action: "silent_navigate"
    url: "https://atresiq-demo-augqbvgzbjgjash3.centralindia-01.azurewebsites.net/admin/skill-assignment"
  - action: "silent_wait"
    value: "5000"

  # --- P1: MANDATORY FIELD VALIDATION ---
  - name: "P1: Form Validation Capture"
    action: "refresh"
  - action: "silent_wait"
    value: "8000"
  # Open Dialog
  - action: "click"
    locator: "xpath=(//button[@id='assign-button'])[2]"
  - action: "silent_wait"
    value: "2000"
  # Click Save (Index 3) without data to trigger red error messages
  - action: "click"
    locator: "xpath=(//button[@id='assign-button'])[3]"
  # Use standard wait (not silent) to ensure report captures the red text
  - action: "wait"
    value: "3000"
  # Close Dialog to reset for actual data entry
  - action: "click"
    locator: "xpath=//button[@data-slot='dialog-close']"

  # --- P2: DATA DRIVEN ASSIGNMENT PROCESS ---
  - name: "P2: Skill Assignment Process"
    action: "data_loop"
    steps:
      # 1. Open the Assign Dialog
      - action: "click"
        locator: "xpath=(//button[@id='assign-button'])[2]"
      
      # 2. SELECT RESOURCE
      - action: "click"
        locator: "xpath=//button[.//span[contains(text(), 'Select Resource')]]"
      - action: "input"
        locator: "xpath=//input[@placeholder='Search...']"
        value: "${resource_name}"
        clear_before: true
      - action: "silent_wait"
        value: "1500"
      - action: "hover"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${resource_name}')]"
      - action: "click"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${resource_name}')]"

      # 3. SELECT SKILL
      - action: "click"
        locator: "xpath=//button[.//span[contains(text(), 'Select Skill')]]"
      - action: "input"
        locator: "xpath=//input[@placeholder='Search...']"
        value: "${skill_name}"
        clear_before: true
      - action: "silent_wait"
        value: "1500"
      - action: "hover"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${skill_name}')]"
      - action: "click"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${skill_name}')]"

      # 4. SELECT SUB-SKILL
      - action: "click"
        locator: "xpath=//button[.//span[contains(text(), '-- Select SubSkill --')]]"
      - action: "input"
        locator: "xpath=//input[@placeholder='Search...']"
        value: "${sub_skill}"
        clear_before: true
      - action: "silent_wait"
        value: "1500"
      - action: "hover"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${sub_skill}')]"
      - action: "click"
        locator: "xpath=//button[contains(@class, 'hover:bg-gray-100')]//span[contains(text(), '${sub_skill}')]"

      # 5. INPUT PROFICIENCY
      - action: "input"
        locator: "xpath=//input[@id='search-button' and @type='number']"
        value: "${proficiency_score}"
        clear_before: true
        send_enter: true

      # 6. SAVE
      - action: "click"
        locator: "xpath=(//button[@id='assign-button'])[3]"
      - action: "silent_wait"
        value: "5000"